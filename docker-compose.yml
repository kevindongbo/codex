name: ${COMPOSE_PROJECT_NAME:-dongbo-erp}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?请在 .env 中配置 POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?请在 .env 中配置 POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中配置 POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - erp

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?请在 .env 中配置 DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-false}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-false}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-false}
      DATABASE_URL: ${DATABASE_URL:?请在 .env 中配置 DATABASE_URL}
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "${GUNICORN_WORKERS:-3}"
      - --timeout
      - "${GUNICORN_TIMEOUT:-60}"
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; request = urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(request, timeout=3)
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - erp

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      APP_SITE_ADDRESS: ${APP_SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/srv/www/index.html:ro
      - ./styles.css:/srv/www/styles.css:ro
      - ./app.js:/srv/www/app.js:ro
      - ./monitoring-targets.json:/srv/www/monitoring-targets.json:ro
      - django_static:/srv/django-static:ro
      - django_media:/srv/django-media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - erp

networks:
  erp:
    driver: bridge

volumes:
  postgres_data:
  django_static:
  django_media:
  caddy_data:
  caddy_config:
